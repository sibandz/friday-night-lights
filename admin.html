<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FNL Admin - Manage Fixtures</title>
  <link rel="stylesheet" href="sf-pro.css" />
  <style>
    body {
      background: var(--black, #080808);
      color: var(--white, #f0ede6);
      font-family: var(--font-sfpro), 'SF Pro', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      --glass-bg: rgba(20, 20, 20, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --inner-card-bg: rgba(0,0,0,0.2);
      --inner-badge-bg: rgba(255,255,255,0.04);
      --inner-badge-hover-bg: rgba(255,255,255,0.08);
      --inner-meta-bg: rgba(0,0,0,0.3);
      --modal-bg: rgba(15,15,15,0.9);
      --modal-input-bg: rgba(0,0,0,0.4);
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(var(--glass-border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .admin-container {
      max-width: 900px;
      margin: 48px auto;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      padding: 40px 32px;
      position: relative;
      z-index: 1;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .btn-icon {
      background: transparent; border: none; color: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 8px; border-radius: 6px; transition: background 0.2s;
      flex-shrink: 0;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.05); }
    body.light-mode .btn-icon:hover { background: rgba(0,0,0,0.05); }
    .admin-header h1 {
      margin-bottom: 0;
    }
    h1 {
      font-family: var(--font-display, 'Bebas Neue', sans-serif);
      font-size: 2.5rem;
      color: var(--gold, #f5c518);
      margin-bottom: 24px;
    }
    .admin-login {
      max-width: 320px;
      margin: 0 auto 32px;
      background: var(--inner-card-bg);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .admin-login input {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--border, #222);
      border-radius: 6px;
      font-size: 1rem;
      font-family: var(--font-sfpro);
      background: var(--card, #141414);
      color: var(--white, #f0ede6);
    }
    .admin-login button {
      width: 100%;
      padding: 12px;
      background: var(--gold, #f5c518);
      color: var(--black, #080808);
      border: none;
      border-radius: 6px;
      font-family: var(--font-head, 'Barlow Condensed', sans-serif);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .admin-login button:hover {
      background: #ffd740;
    }
    .fixture-editor {
      display: none;
    }
    .fixture-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 32px;
    }
    .fixture-card {
      background: var(--inner-card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px 20px 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }
    .fixture-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-head, 'Barlow Condensed', sans-serif);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white, #f0ede6);
    }
    .fixture-vs {
      font-weight: 700;
      color: var(--gold, #f5c518);
      margin: 0 8px;
    }
    .fixture-meta {
      display: flex;
      gap: 12px;
      font-size: 0.95rem;
      color: var(--muted, #888);
      margin-bottom: 4px;
    }
    .fixture-date {
      font-size: 0.92rem;
      color: var(--muted, #888);
    }
    .fixture-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
      justify-content: flex-end;
    }
    .fixture-actions button {
      background: transparent;
      border: 1px solid var(--border, #222);
      color: var(--white, #f0ede6);
      font-size: 0.8rem;
      font-family: var(--font-head, 'Barlow Condensed', sans-serif);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .fixture-actions button:hover {
      border-color: var(--gold, #f5c518);
      color: var(--gold, #f5c518);
    }
    .add-fixture-btn {
      margin-top: 24px;
      background: var(--gold, #f5c518);
      color: var(--black, #080808);
      border: none;
      border-radius: 6px;
      font-family: var(--font-head, 'Barlow Condensed', sans-serif);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 24px;
    }
    .add-fixture-btn:hover {
      background: #ffd740;
    }
    
    /* ── TABS ────────────────────────────────────────────── */
    .admin-tabs {
      display: flex; gap: 16px; margin-bottom: 32px;
      border-bottom: 1px solid var(--glass-border); padding-bottom: 16px;
    }
    .tab-btn {
      background: transparent; color: var(--muted, #888); border: none; font-family: var(--font-head);
      font-size: 1.1rem; font-weight: 700; text-transform: uppercase; cursor: pointer; padding: 8px 16px; transition: all 0.2s;
    }
    .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
    .tab-btn:hover:not(.active) { color: var(--white); }

    /* ── TEAMS UI ────────────────────────────────────────── */
    .teams-editor { display: none; }
    .add-team-panel { background: var(--inner-card-bg); border: 1px solid var(--glass-border); padding: 24px; border-radius: 16px; margin-bottom: 32px; }
    .add-team-panel h3 { margin-top: 0; color: var(--gold); font-family: var(--font-head); font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .add-team-row { display: grid; grid-template-columns: 1fr 1fr 2fr auto; gap: 12px; align-items: end; }
    .add-team-row input, .add-team-row select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--white); font-family: var(--font-sfpro); font-size: 0.95rem; }
    .add-team-row button { padding: 12px 24px; background: var(--gold); color: var(--black); border: none; border-radius: 6px; font-family: var(--font-head); font-weight: 700; font-size: 1rem; text-transform: uppercase; cursor: pointer; height: 44px; }
    .add-team-row button:hover { background: #ffd740; }
    @media (max-width: 768px) { .add-team-row { grid-template-columns: 1fr; } .add-team-row button { height: auto; } }

    .team-badge { display: flex; align-items: center; justify-content: space-between; background: var(--inner-badge-bg); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px 16px; font-size: 0.95rem; transition: background 0.2s; }
    .team-badge:hover { background: var(--inner-badge-hover-bg); }
    .team-badge-meta { font-size: 0.75rem; color: var(--muted); margin-left: 12px; font-family: var(--font-head); text-transform: uppercase; letter-spacing: 0.05em; background: var(--inner-meta-bg); padding: 4px 8px; border-radius: 4px; }
    .team-badge-actions button { background: transparent; border: none; color: #ff4757; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; padding: 4px; }

    /* ── MODAL STYLES ────────────────────────────────────── */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-content {
      background: var(--modal-bg); border: 1px solid var(--glass-border);
      padding: 32px; border-radius: 16px; width: 90%; max-width: 600px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      position: relative;
    }
    .modal-content h2 {
      margin-top: 0; color: var(--gold); font-family: var(--font-head);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 20px;
    }
    .modal-content input, .modal-content select {
      width: 100%; padding: 12px; margin-bottom: 14px;
      border: 1px solid var(--border, #222); border-radius: 6px;
      font-size: 1rem; font-family: var(--font-sfpro);
      background: var(--modal-input-bg); color: var(--white, #f0ede6);
    }
    .modal-content input:focus, .modal-content select:focus {
      border-color: var(--gold, #f5c518); outline: none;
    }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 600px) { .modal-grid { grid-template-columns: 1fr; gap: 8px; } }
    .form-group label { display: block; font-family: var(--font-head); font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .modal-content input, .modal-content select { margin-bottom: 0; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }
    .btn-cancel, .btn-save {
      flex: 1; padding: 12px; border-radius: 6px; font-family: var(--font-head);
      font-weight: 700; font-size: 1rem; text-transform: uppercase; cursor: pointer; letter-spacing: 0.1em; transition: all 0.2s;
    }
    .btn-cancel {
      background: transparent; color: var(--white); border: 1px solid var(--border);
    }
    .btn-cancel:hover { border-color: var(--white); }
    .btn-save {
      background: var(--gold); color: var(--black); border: none;
    }
    .btn-save:hover { background: #ffd740; }

    @media (max-width: 800px) {
      .fixture-list { grid-template-columns: 1fr; }
    }

    /* ── LIGHT MODE OVERRIDES ────────────────────────────── */
    body.light-mode {
      --black:   #f0ede6;
      --dark:    #e8e5de;
      --card:    #ffffff;
      --border:  #dcd9d2;
      --glass-bg: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(0, 0, 0, 0.1);
      --white:   #080808;
      --muted:   #666666;
      --inner-card-bg: rgba(255,255,255,0.4);
      --inner-badge-bg: rgba(0,0,0,0.04);
      --inner-badge-hover-bg: rgba(0,0,0,0.08);
      --inner-meta-bg: rgba(0,0,0,0.05);
      --modal-bg: rgba(240,237,230,0.95);
      --modal-input-bg: rgba(255,255,255,0.5);
    }
    body.light-mode .admin-login button,
    body.light-mode .add-fixture-btn,
    body.light-mode .add-team-row button,
    body.light-mode .btn-save {
      color: var(--black);
    }
    body.light-mode input[type="date"]::-webkit-calendar-picker-indicator {
      filter: none;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h1>Admin Fixture Manager</h1>
      <button id="mode-toggle" class="btn-icon" aria-label="Toggle dark mode"><i data-lucide="moon"></i></button>
    </div>
    <div class="admin-login" id="admin-login">
      <form id="admin-login-form">
        <input type="password" id="admin-password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
    </div>

    <div class="admin-tabs" id="admin-tabs" style="display:none;">
      <button class="tab-btn active" id="tab-fixtures" onclick="switchTab('fixtures')">Fixtures</button>
      <button class="tab-btn" id="tab-teams" onclick="switchTab('teams')">Teams</button>
    </div>

    <div class="fixture-editor" id="fixture-editor">
      <button class="add-fixture-btn" id="add-fixture-btn">Add Fixture</button>
      <div class="fixture-list" id="fixture-list"></div>
    </div>

    <div class="teams-editor" id="teams-editor">
      <div class="add-team-panel">
        <h3>Add New Team</h3>
        <form class="add-team-row" id="add-team-form">
          <div class="form-group">
            <label>Sport</label>
            <select id="team-sport" onchange="updateDivisions('team-sport', 'team-division')" required></select>
          </div>
          <div class="form-group">
            <label>Division</label>
            <select id="team-division" required></select>
          </div>
          <div class="form-group">
            <label>Team Name</label>
            <input type="text" id="team-name" placeholder="Enter team name" required autocomplete="off" />
          </div>
          <button type="submit">Add Team</button>
        </form>
      </div>
      <div id="teams-list-container"></div>
    </div>
  </div>

  <!-- ── MODAL POPUP ─────────────────────────────────────── -->
  <div class="modal-overlay" id="fixture-modal">
    <div class="modal-content">
      <h2 id="modal-title">Add Fixture</h2>
      <form id="modal-form">
        <div class="modal-grid">
          <div class="form-group">
            <label>Sport</label>
            <select id="modal-sport" onchange="updateDivisions('modal-sport', 'modal-division'); updateModalTeams();" required></select>
          </div>
          <div class="form-group">
            <label>Age Group / Division</label>
            <select id="modal-division" onchange="updateModalTeams()" required></select>
          </div>
          <div class="form-group">
            <label>Team A</label>
            <select id="modal-teamA" required></select>
          </div>
          <div class="form-group">
            <label>Team B</label>
            <select id="modal-teamB" required></select>
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="modal-date" required style="color-scheme: dark;" />
          </div>
          <div class="form-group">
            <label>Time</label>
            <input type="text" id="modal-time" placeholder="e.g. 17:00 or TBD" required />
          </div>
          <div class="form-group">
            <label>Match Status</label>
            <select id="modal-status" required>
              <option value="upcoming">Upcoming</option>
              <option value="live">Live</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label>Match Type / Pool</label>
            <input type="text" id="modal-type" placeholder="e.g. Pool A" required />
          </div>
          <div class="form-group" style="grid-column: 1 / -1;">
            <label>Venue</label>
            <input type="text" id="modal-venue" placeholder="e.g. Main Field" />
          </div>
        </div>
        <div style="display:flex; gap:16px;">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="admin.js"></script>
</body>
</html>
